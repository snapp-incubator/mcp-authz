# mcp-gateway — MCP-layer enforcement proxy.
#
# One instance runs in front of ONE MCP server (one cluster). It verifies the
# user's signed scope token and rejects any tools/call that references a
# namespace the user is not authorized for on this cluster — before it reaches
# the MCP server. The MCP server is unchanged; the agent cannot bypass it.

# This gateway's cluster. MUST match a cluster key in the scope token (and the
# bot's region name / Dify provider). Authorizes against scope[cluster].
cluster: okd4-ts-2

# The real MCP server this gateway fronts.
upstream: http://cilium-hubble-mcp-svc:8080

# Signed scope token (HMAC, shared secret with the bot).
tokenHeader: X-Scope-Token
tokenSecretEnv: SCOPE_TOKEN_SECRET
# Reject tools/call with no/invalid token (fail-closed).
required: true

# Per-tool namespace extraction. "*" is the default; mark cluster-health tools
# public to skip auth.
tools:
  "*":
    requireNamespace: true
    namespaceArgs:
      - {key: namespace, format: plain}
      - {key: pod, format: slash}
      - {key: source_pod, format: slash}
      - {key: destination_pod, format: slash}
      - {key: service, format: slash}
      - {key: source_service, format: slash}
      - {key: destination_service, format: slash}
  server_status: {public: true}
  get_nodes: {public: true}
  get_namespaces: {public: true}
