# mcp-authz example configuration.
#
# Adding a new MCP server to protect is a config change only — declare its
# upstream and which tool arguments carry a namespace. The decision engine and
# enforcement proxy are reused unchanged.

identity:
  # Headers injected by the upstream auth proxy / chatbot. First non-empty wins.
  # X-User-Id carries the end-user identity Mattermost sends to Dify and Dify
  # forwards here (must be the OpenShift username/email, not a raw chat user id).
  userHeaders:
    - X-User-Id
    - X-Forwarded-Email
    - X-Forwarded-User
    - X-Auth-Request-Email
  groupsHeader: X-Forwarded-Groups
  groupsDelimiter: ","
  # Reject requests with no identity (recommended).
  required: true

authorizer:
  # kube  -> OpenShift RBAC via SubjectAccessReview (recommended).
  # static-> in-config user/group -> namespace map (no cluster RBAC).
  # allow -> allow everything (local dev only).
  provider: kube
  # Cache decisions briefly to collapse repeated SARs within a single
  # multi-namespace tool call. Empty disables.
  cacheTTL: 30s
  # Default RBAC action checked per namespace. "can the user GET pods here?"
  # is a good proxy for "can the user see this namespace's workloads".
  action:
    verb: get
    group: ""
    resource: pods
  kube:
    # Empty = in-cluster config.
    kubeconfig: ""
    # Restrict /v1/namespaces enumeration (optional label selector).
    namespaceSelector: ""
    listConcurrency: 16
  # Used only when provider: static.
  static:
    users:
      saman.hoseini@snapp.cab:
        - team-a
        - team-b
    groups:
      platform-admins:
        - "*"

mcps:
  cilium-hubble-mcp:
    upstream: http://cilium-hubble-mcp-svc:8080
    tools:
      # Default rule for every hubble tool: namespaces come from the namespace
      # arg and from the namespace prefix of pod/service selectors.
      "*":
        requireNamespace: true
        namespaceArgs:
          - {key: namespace, format: plain}
          - {key: pod, format: slash}
          - {key: source_pod, format: slash}
          - {key: destination_pod, format: slash}
          - {key: service, format: slash}
          - {key: source_service, format: slash}
          - {key: destination_service, format: slash}
      # Cluster-health tools expose no tenant data — make them public.
      server_status: {public: true}
      get_nodes: {public: true}
      get_namespaces: {public: true}

  contour-envoy-mcp:
    upstream: http://contour-envoy-mcp-svc:8080
    tools:
      "*":
        # Envoy/Contour tools are largely cluster-scoped ingress state; deny by
        # default unless a tool is explicitly made public or namespace-scoped.
        requireNamespace: true
        namespaceArgs:
          - {key: namespace, format: plain}
