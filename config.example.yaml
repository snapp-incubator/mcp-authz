# mcp-authz — authorization API for the SnappCloud bot.
#
# One instance runs per cluster. It answers, for THIS cluster via in-cluster
# RBAC, which namespaces a user may access. The bot calls every region's instance
# and aggregates. No kubeconfigs, no knowledge of other clusters/Mattermost/Dify.

server:
  # Env var holding the bearer token the bot must present. Empty disables auth
  # (then rely on NetworkPolicy). The token is shared with the bot.
  authTokenEnv: AUTH_TOKEN

authorizer:
  # kube  -> in-cluster OpenShift RBAC via SubjectAccessReview (recommended).
  # static-> in-config user/group -> namespace map (dev).
  provider: kube
  # "Can the user GET pods in namespace N?" is the proxy for "can the user see
  # this namespace's workloads".
  action:
    verb: get
    group: ""
    resource: pods
  namespaceSelector: "" # optional label selector to exclude system namespaces
  listConcurrency: 16
  # client-go rate limit (defaults 50/100) — avoids client-side throttling on a
  # many-namespace SAR sweep.
  qps: 50
  burst: 100
  # Used only when provider: static.
  static:
    users:
      saman.hoseini@snapp.cab:
        - team-a
        - team-b
    groups:
      platform-admins:
        - "*"
