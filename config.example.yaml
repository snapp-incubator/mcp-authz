# mcp-authz — SnappCloud Mattermost bot backend.
#
# The bot listens on the Mattermost WebSocket, authenticates the chatting user
# (real SSO identity), checks whether they are authorized for their query
# (OpenShift RBAC), and only then forwards it to the Dify workflow.
#
# Secrets (the Mattermost bot token and the Dify API key) are NOT stored here —
# they are read from the environment variables named below.

mattermost:
  url: https://mattermost.snapp.cab
  tokenEnv: MATTERMOST_TOKEN
  # Optional: map a Mattermost email to a different OpenShift username.
  # Default (empty) uses the Mattermost email verbatim as the SSO identity.
  identityMap: {}
    # alice@snapp.cab: alice.smith@snapp.cab

dify:
  url: https://dify.snappcloud.io/v1
  apiKeyEnv: DIFY_API_KEY

authorizer:
  # kube  -> OpenShift RBAC via SubjectAccessReview (recommended).
  # static-> in-config user/group -> namespace map.
  # allow -> allow everything (local dev only).
  provider: kube
  # Cache decisions briefly. Empty disables.
  cacheTTL: 30s
  # "Can the user GET pods in namespace N?" is the proxy for "can the user see
  # this namespace's workloads". The bot lists every namespace passing this.
  action:
    verb: get
    group: ""
    resource: pods
  kube:
    kubeconfig: "" # empty = in-cluster
    namespaceSelector: "" # optional label selector to exclude system namespaces
    listConcurrency: 16
  static:
    users:
      saman.hoseini@snapp.cab:
        - team-a
        - team-b
    groups:
      platform-admins:
        - "*"
